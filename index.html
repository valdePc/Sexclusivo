<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adult Content</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #e60073;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #ff007f;
        }
        .toggle {
            margin-top: 10px;
            cursor: pointer;
            color: #ff007f;
        }
    </style>
</head>
<body>
    <div class="container" id="loginContainer">
        <h2 id="formTitle">Iniciar Sesión</h2>
        <input type="text" id="email" placeholder="Correo Electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button onclick="handleAuth()">Entrar</button>
        <p class="toggle" onclick="toggleForm()">¿No tienes cuenta? Regístrate</p>
    </div>

    <script>
        let isLogin = true;
        const apiKey = 'patyZBvcOIap41ai5.d05bb4c1056c366b3daa016ff81d704f0d16b8bc2883e1d55036efea92366a5f';
        const baseUrl = 'https://api.airtable.com/v0/app4hvr9H3C5RzRLh/tbl8xgedxdzdl7Wl5';

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? 'Iniciar Sesión' : 'Registro';
            document.querySelector('button').innerText = isLogin ? 'Entrar' : 'Registrarse';
            document.querySelector('.toggle').innerText = isLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia Sesión';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isLogin) {
                login(email, password);
            } else {
                register(email, password);
            }
        }

        async function login(email, password) {
            try {
                const response = await fetch(baseUrl, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                if (!response.ok) throw new Error('Error en la conexión');
                const data = await response.json();
                const user = data.records.find(record => record.fields.Email === email && record.fields.Password === password);
                if (user) {
                    alert('Inicio de sesión exitoso');
                    window.location.href = 'contenido.html';
                } else {
                    alert('Correo o contraseña incorrectos');
                }
            } catch (error) {
                alert('Error en el inicio de sesión');
            }
        }

        async function register(email, password) {
            try {
                const checkResponse = await fetch(baseUrl, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                if (!checkResponse.ok) throw new Error('Error en la conexión');
                const checkData = await checkResponse.json();
                const existingUser = checkData.records.find(record => record.fields.Email === email);
                
                if (existingUser) {
                    alert('Este correo ya está registrado.');
                    return;
                }
                
                const response = await fetch(baseUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fields: { Email: email, Password: password }
                    })
                });
                if (response.ok) {
                    alert('Registro exitoso, ahora inicia sesión');
                    toggleForm();
                } else {
                    alert('Error en el registro');
                }
            } catch (error) {
                alert('Error en el registro');
            }
        }
    </script>
</body>
</html>
